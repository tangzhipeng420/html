<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兰新团队 · 7月报量看板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;padding:20px}
  .container{max-width:1200px;margin:0 auto}
  .header{background:linear-gradient(135deg,#e65100,#bf360c);color:#fff;padding:24px 32px;border-radius:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
  .header h1{font-size:26px;font-weight:700}
  .header .sub{font-size:13px;opacity:.8;margin-top:4px}
  .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
  .card h2{font-size:17px;font-weight:600;color:#e65100;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e8edf2}
  .empty-state{padding:40px;text-align:center;color:#999}
  .empty-state .icon{font-size:48px;margin-bottom:12px}
  .empty-state p{font-size:14px;line-height:1.8}
  .footer{text-align:center;padding:16px;color:#999;font-size:12px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📊 兰新团队 · 7月报量看板</h1>
      <div class="sub">统计周期：7月1日起 · 🔄 更新于 2026-07-01</div>
    </div>
    <span class="badge" style="background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;font-size:13px;color:#fff">2026年7月 · 🆕 新月份</span>
  </div>

  <div class="card">
    <h2>📢 等待唐确认</h2>
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>
        7月考核指标待唐确认<br>
        报量数据到达后自动更新
      </p>
    </div>
  </div>

  <div class="card">
    <h2>📅 报量明细</h2>
    <div class="empty-state">
      <div class="icon">📝</div>
      <p>尚未收到7月报量数据</p>
    </div>
  </div>

  <div class="footer">🦐 2026-07-01 · 6月已存档 → archive/2026-06/</div>
</div>
</body>
</html>
